# Render Blueprint — one free web service that builds from the Dockerfile.
# Deploy: push to GitHub, then Render → New → Blueprint → pick this repo.
services:
  - type: web
    name: scholarai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false        # set this in the Render dashboard (secret)
      - key: DEMO_REFERENCE_DATE
        value: "2026-01-05"
